# =============================================================================
# 0. Основные настройки
# =============================================================================
# Убираем задержку для клавиши Escape
set -sg escape-time 0

# Включаем поддержку True Color
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc"

# Увеличиваем лимит истории
set -g history-limit 10000

# Начинаем нумерацию окон и панелей с 1 (более интуитивно)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Используем текущий shell пользователя
set -g default-shell "$SHELL"

# Включаем отслеживание фокуса для интеграции с редакторами
set -g focus-events on

# =============================================================================
# 1. Горячие клавиши
# =============================================================================
# Меняем префикс с C-b на C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Перезагрузка конфига
bind r source-file ~/.tmux.conf \; display "Конфиг перезагружен!"

# Разделение панелей в текущей директории
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Создание нового окна в текущей директории
bind c new-window -c "#{pane_current_path}"

# Переключение между окнами без префикса (Alt + номер)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10
bind Tab last-window

# Навигация между панелями без префикса (Ctrl + vim-клавиши)
# Эти бинды отлично работают с плагином vim-tmux-navigator
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Изменение размера панелей с префиксом (Prefix + Shift + vim-клавиши)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Зум панели (развернуть/свернуть)
bind z resize-pane -Z

# =============================================================================
# 2. Внешний вид (Dracula-like)
# =============================================================================
# Цвета
bg_color="#282a36"
current_line_color="#44475a"
fg_color="#f8f8f2"
comment_color="#6272a4"
cyan_color="#8be9fd"
green_color="#50fa7b"
orange_color="#ffb86c"
pink_color="#ff79c9"
purple_color="#bd93f9"
red_color="#ff5555"
yellow_color="#f1fa8c"

# Статусная строка
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=${current_line_color} fg=${fg_color}"

# Левая часть статусной строки: имя сессии
set -g status-left-length 40
set -g status-left "#[bg=${green_color},fg=${bg_color},bold] #S #[bg=${current_line_color},fg=${green_color}]"

# Правая часть: индикатор префикса, дата и время
set -g status-right-length 50
set -g status-right "#{prefix_highlight} #[fg=${yellow_color}]%d.%m.%Y #[fg=${cyan_color}]%H:%M "

# Формат окон в статусной строке
setw -g window-status-format "#[fg=${comment_color}] #I:#W "
setw -g window-status-current-format "#[bg=${purple_color},fg=${bg_color},bold] #I:#W #[bg=${current_line_color},fg=${purple_color}]"

# Разделитель панелей
set -g pane-border-style "fg=${current_line_color}"
set -g pane-active-border-style "fg=${purple_color}"

# Сообщения
set -g message-style "bg=${current_line_color},fg=${cyan_color}"
set -g message-command-style "bg=${current_line_color},fg=${cyan_color}"

# =============================================================================
# 3. Мышь и копирование
# =============================================================================
set -g mouse on
setw -g mode-keys vi

# =============================================================================
# 4. Плагины (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Улучшение внешнего вида и функциональности
set -g @plugin 'sainnhe/tmux-transparent'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Копирование в системный буфер обмена
set -g @plugin 'tmux-plugins/tmux-yank'

# Сохранение и восстановление сессий
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# =============================================================================
# 5. Настройки плагинов
# =============================================================================
# tmux-continuum: автоматически восстанавливать сессию при запуске tmux
set -g @continuum-restore 'on'

# tmux-prefix-highlight: Настройки индикатора
set -g @prefix_highlight_fg "${bg_color}"
set -g @prefix_highlight_bg "${pink_color}"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=${bg_color},bg=${orange_color}"

# =============================================================================
# 6. Запуск TPM
# =============================================================================
# Должен быть в самом конце файла
run '~/.tmux/plugins/tpm/tpm'
