# =============================================
# 0. Основные настройки
# =============================================
# Enable mouse support
set -g mouse on

# Allow mouse to select text and copy to clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

set -sg escape-time 0
set -g focus-events on
set -g renumber-windows on
set -g base-index 0
setw -g pane-base-index 0
set -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"
set -g default-shell "$SHELL"
set -g history-limit 10000
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =============================================
# 1. Навигация и управление
# =============================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind Tab last-window

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# =============================================
# 2. Внешний вид
# =============================================
set -g pane-active-border-style "fg=#bd93f9"
set -g pane-border-style "fg=#44475a"
set -g status-style "bg=default fg=#6272a4"
set -g status-right "#[fg=#6272a4]%H:%M"
setw -g window-status-format "#[fg=#6272a4] #I:#W "
setw -g window-status-current-format "#[fg=#f8f8f2 bold] #I:#W "

# =============================================
# 3. Плагины
# =============================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-transparent'
set -g @plugin 'tmux-plugins/tmux-yank'

# =============================================
# 4. Автозагрузка плагинов
# =============================================
run '~/.tmux/plugins/tpm/tpm'
