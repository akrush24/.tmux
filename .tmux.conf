# =============================================================================
# 0. Основные настройки
# =============================================================================
# Убираем задержку для клавиши Escape
set -sg escape-time 0

# Включаем поддержку True Color
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc"

# Лимит истории
set -g history-limit 50000

# Начинаем нумерацию окон и панелей с 0
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on

# Используем текущий shell пользователя
set -g default-shell "$SHELL"

# Включаем отслеживание фокуса
set -g focus-events on

# Агрессивное изменение размера панелей при изменении окна терминала
set -g aggressive-resize on

# Обновление статуса (оставим 5 секунд)
set -g status-interval 5

# =============================================================================
# 1. Горячие клавиши
# =============================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Перезагрузка конфига
bind r source-file ~/.tmux.conf \; display "Конфиг перезагружен!"

# Разделение панелей в текущей директории
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Новое окно в текущей директории
bind c new-window -c "#{pane_current_path}"

# Переключение между окнами без префикса (Alt + номер)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10
bind Tab last-window

# Навигация между панелями (Ctrl + hjkl) – для vim-tmux-navigator
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Изменение размера панелей (Prefix + Shift + hjkl)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Зум панели
bind z resize-pane -Z

# Переключение на последнюю активную панель (как в Vim Ctrl+^)
bind ';' last-pane

# Быстрый показ всех привязок (Prefix + ?)
bind ? list-keys

# =============================================================================
# 2. Внешний вид (Dracula-like)
# =============================================================================
# Цвета (оставлены без изменений)
bg_color="#282a36"
current_line_color="#44475a"
fg_color="#f8f8f2"
comment_color="#6272a4"
cyan_color="#8be9fd"
green_color="#50fa7b"
orange_color="#ffb86c"
darker_orange_color="#cc8844"
pink_color="#ff79c9"
purple_color="#bd93f9"
red_color="#ff5555"
yellow_color="#f1fa8c"
black_color="#000000"
light_gray_color="#cccccc"
darker_gray_color="#999999"

# Статусная строка
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=${current_line_color} fg=${fg_color}"

# Левая часть
set -g status-left-length 40
set -g status-left "#[bg=${comment_color},fg=${bg_color},bold] #S #[bg=${current_line_color},fg=${comment_color}]"

# Правая часть
set -g status-right-length 150
set -g status-right "#{prefix_highlight}\
#[fg=${orange_color},bold]#(test -x ~/.tmux/get_location.sh && ~/.tmux/get_location.sh || hostname -s)\
#[fg=${comment_color}]|\
#{cpu_fg_color}#{cpu_percentage}#[fg=${comment_color}]\
#[fg=${comment_color}]#{cpu_temp_fg_color} #{cpu_temp}\
#[fg=${comment_color}]|\
#[fg=${darker_orange_color}]%H:%M\
#[fg=${comment_color}]|\
#[fg=${darker_orange_color},bold]%d.%m"

# Формат активного окна
setw -g window-status-current-format "#[bg=${darker_gray_color},fg=${bg_color},bold] #I:#W #[bg=${current_line_color},fg=${darker_gray_color}]"

# Формат неактивных окон
setw -g window-status-format "#[fg=${comment_color}] #I:#W #[fg=${comment_color}]"
setw -g window-status-separator ""

# Разделители панелей
set -g pane-border-style "fg=${current_line_color}"
set -g pane-active-border-style "fg=${light_gray_color}"

# Сообщения
set -g message-style "bg=${current_line_color},fg=${cyan_color}"
set -g message-command-style "bg=${current_line_color},fg=${cyan_color}"

# =============================================================================
# 3. Мышь и копирование
# =============================================================================
set -g mouse on
setw -g mode-keys vi

# Поддержка OSC52 для копирования в системный буфер (дополнительно к tmux-yank)
set -g set-clipboard on

# =============================================================================
# 4. Плагины (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'sainnhe/tmux-transparent'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# =============================================================================
# 5. Настройки плагинов
# =============================================================================
# tmux-continuum: автоматическое восстановление (по желанию раскомментируйте)
# set -g @continuum-restore 'on'

# tmux-resurrect: сохранять содержимое панелей
set -g @resurrect-capture-pane-contents 'on'

# tmux-prefix-highlight
set -g @prefix_highlight_fg "${bg_color}"
set -g @prefix_highlight_bg "${comment_color}"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=${bg_color},bg=${comment_color}"

# Явно указываем буфер обмена для tmux-yank (Linux)
# set -g @yank_selection 'clipboard'   # или 'primary' – выберите удобный вариант

# tmux-cpu: пороги температуры
set -g @cpu_temp_unit "C"
set -g @cpu_low_fg_color "#[fg=${green_color}]"
set -g @cpu_medium_fg_color "#[fg=${yellow_color}]"
set -g @cpu_high_fg_color "#[fg=${orange_color}]"
set -g @cpu_temp_low_fg_color "#[fg=${green_color}]"
set -g @cpu_temp_medium_fg_color "#[fg=${yellow_color}]"
set -g @cpu_temp_high_fg_color "#[fg=${orange_color}]"
set -g @cpu_temp_medium_thresh "45"
set -g @cpu_temp_high_thresh "65"

# =============================================================================
# 6. Запуск TPM (должен быть в самом конце)
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'
